<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUSH · Aktivierungsstation</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#0f0; text-align:center; }

#geo {
    width:360px;
    height:360px;
    margin:auto;
    border-radius:50%;
    border:3px solid #0f0;
    position:relative;
}

.dot {
    width:12px;
    height:12px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #0f0;
}
</style>

<script src="PUSH.core.js"></script>
<script src="PUSH.state.js"></script>
<script src="PUSH.pipe.js"></script>

</head>

<body>

<h1>PUSH · Aktivierungsstation</h1>

<div id="geo"></div>
<pre id="status">Lade PUSH…</pre>

<script>
const geo = document.getElementById("geo");
const count = 36;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle)*radius + 180 - 6;
    const y = Math.sin(angle)*radius + 180 - 6;

    dot.style.left = x+"px";
    dot.style.top  = y+"px";

    geo.appendChild(dot);
}

PUSH.enter(123);

const state = PUSH_STATE.detect(PUSH.input);
PUSH.state = state;

const triggered = PUSH.activate();
const result = PUSH.compute();
const forward = PUSH_PIPE.forward(result);

document.getElementById("status").innerText =
    JSON.stringify({ PUSH: result, forward }, null, 2);
</script>

</body>
</html>
